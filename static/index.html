<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Growth Companion</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; height: 100vh; display: flex; }

  /* 侧边栏 */
  .sidebar { width: 260px; background: #1a1a2e; color: #e0e0e0; display: flex; flex-direction: column; padding: 20px 0; }
  .sidebar h1 { font-size: 18px; padding: 0 20px 20px; border-bottom: 1px solid #333; color: #fff; }
  .sidebar nav a { display: block; padding: 12px 20px; color: #aaa; text-decoration: none; cursor: pointer; transition: all .2s; }
  .sidebar nav a:hover, .sidebar nav a.active { color: #fff; background: #16213e; }
  .sidebar .weights { margin-top: auto; padding: 16px 20px; font-size: 12px; border-top: 1px solid #333; }
  .sidebar .weights .bar { height: 6px; background: #333; border-radius: 3px; margin: 3px 0 8px; }
  .sidebar .weights .bar-fill { height: 100%; background: #6c63ff; border-radius: 3px; transition: width .3s; }
  .sidebar .weights .row { display: flex; justify-content: space-between; color: #888; }

  /* 主区域 */
  .main { flex: 1; display: flex; flex-direction: column; max-height: 100vh; }
  .topbar { padding: 16px 24px; background: #fff; border-bottom: 1px solid #e0e0e0; font-size: 14px; color: #666; }

  /* 聊天 */
  #chat-panel, #init-panel, #memory-panel { display: none; flex: 1; flex-direction: column; }
  #chat-panel.active, #init-panel.active, #memory-panel.active { display: flex; }

  .messages { flex: 1; overflow-y: auto; padding: 24px; }
  .msg { max-width: 70%; margin-bottom: 16px; }
  .msg.user { margin-left: auto; }
  .msg .bubble { padding: 12px 16px; border-radius: 16px; line-height: 1.6; font-size: 14px; white-space: pre-wrap; }
  .msg.user .bubble { background: #6c63ff; color: #fff; border-bottom-right-radius: 4px; }
  .msg.ai .bubble { background: #fff; color: #333; border-bottom-left-radius: 4px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
  .msg .meta { font-size: 11px; color: #999; margin-top: 4px; }
  .msg.user .meta { text-align: right; }

  .input-area { padding: 16px 24px; background: #fff; border-top: 1px solid #e0e0e0; display: flex; gap: 12px; }
  .input-area textarea { flex: 1; border: 1px solid #ddd; border-radius: 12px; padding: 12px 16px; font-size: 14px; resize: none; outline: none; font-family: inherit; }
  .input-area textarea:focus { border-color: #6c63ff; }
  .input-area button { background: #6c63ff; color: #fff; border: none; border-radius: 12px; padding: 0 24px; font-size: 14px; cursor: pointer; transition: background .2s; }
  .input-area button:hover { background: #5a52d5; }
  .input-area button:disabled { background: #aaa; cursor: not-allowed; }

  /* 初始化 */
  #init-panel { padding: 40px; overflow-y: auto; align-items: center; }
  #init-panel h2 { font-size: 24px; margin-bottom: 8px; color: #333; }
  #init-panel p { color: #888; margin-bottom: 32px; }
  .form-group { margin-bottom: 20px; width: 100%; max-width: 480px; }
  .form-group label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
  .form-group select, .form-group input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
  .form-group select:focus, .form-group input:focus { border-color: #6c63ff; }
  .form-group .hint { font-size: 12px; color: #aaa; margin-top: 4px; }
  #init-panel button { background: #6c63ff; color: #fff; border: none; border-radius: 12px; padding: 14px 48px; font-size: 16px; cursor: pointer; margin-top: 12px; }

  /* 记忆面板 */
  #memory-panel { padding: 24px; overflow-y: auto; }
  .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .card h3 { font-size: 16px; margin-bottom: 12px; color: #333; }
  .card pre { background: #f8f8f8; padding: 12px; border-radius: 8px; font-size: 13px; white-space: pre-wrap; color: #555; }
  .card .capacity { font-size: 12px; color: #999; margin-top: 8px; }
  .event-item { padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
  .event-item:last-child { border-bottom: none; }
  .event-item .tags span { display: inline-block; background: #ede7f6; color: #5e35b1; padding: 2px 8px; border-radius: 10px; font-size: 11px; margin-right: 4px; }
  .event-item .imp { color: #e53935; font-weight: 600; }

</style>
</head>
<body>

<div class="sidebar">
  <h1>Growth Companion</h1>
  <nav>
    <a class="active" onclick="showPanel('chat')">💬 对话</a>
    <a onclick="showPanel('memory')">🧠 记忆</a>
    <a onclick="showPanel('init')">⚙️ 初始化</a>
  </nav>
  <div class="weights" id="weights-display">
    <div style="color:#888;margin-bottom:8px;">人格权重</div>
  </div>
</div>

<div class="main">
  <div class="topbar" id="topbar">对话 · Growth Companion</div>

  <!-- 聊天面板 -->
  <div id="chat-panel" class="active">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <textarea id="input" rows="1" placeholder="说点什么..." onkeydown="handleKey(event)"></textarea>
      <button id="send-btn" onclick="sendMessage()">发送</button>
    </div>
  </div>

  <!-- 初始化面板 -->
  <div id="init-panel">
    <h2>开始你的成长之旅</h2>
    <p>回答几个简单的问题，让我更了解你</p>
    <div class="form-group">
      <label>你的 MBTI 类型</label>
      <select id="f-mbti">
        <option value="">不确定</option>
        <option>INTJ</option><option>INTP</option><option>ENTJ</option><option>ENTP</option>
        <option>INFJ</option><option selected>INFP</option><option>ENFJ</option><option>ENFP</option>
        <option>ISTJ</option><option>ISFJ</option><option>ESTJ</option><option>ESFJ</option>
        <option>ISTP</option><option>ISFP</option><option>ESTP</option><option>ESFP</option>
      </select>
    </div>
    <div class="form-group">
      <label>情绪表达方式</label>
      <select id="f-emotion">
        <option value="内化型">内化型 — 习惯自己消化情绪</option>
        <option value="外化型">外化型 — 喜欢说出来</option>
        <option value="混合型">混合型 — 看情况</option>
      </select>
    </div>
    <div class="form-group">
      <label>希望 AI 的建议力度</label>
      <select id="f-advice">
        <option value="温和引导">温和引导 — 多倾听少建议</option>
        <option value="适度建议">适度建议 — 该说的时候说</option>
        <option value="直接建议">直接建议 — 给我明确方向</option>
      </select>
    </div>
    <div class="form-group">
      <label>依恋风格</label>
      <select id="f-attachment">
        <option value="焦虑型">焦虑型 — 害怕被抛弃</option>
        <option value="回避型">回避型 — 不太依赖别人</option>
        <option value="安全型">安全型 — 相对平衡</option>
        <option value="不确定">不确定</option>
      </select>
    </div>
    <button onclick="doInit()">开始</button>
  </div>

  <!-- 记忆面板 -->
  <div id="memory-panel">
    <div class="card">
      <h3>用户画像</h3>
      <pre id="mem-profile">加载中...</pre>
      <div class="capacity" id="mem-profile-cap"></div>
    </div>
    <div class="card">
      <h3>AI 笔记</h3>
      <pre id="mem-notes">加载中...</pre>
      <div class="capacity" id="mem-notes-cap"></div>
    </div>
    <div class="card">
      <h3>事件记忆</h3>
      <div id="mem-events">加载中...</div>
    </div>
  </div>
</div>

<script>
const API = 'http://127.0.0.1:8000';
const userId = 'default';

// Panel switching
function showPanel(name) {
  document.querySelectorAll('.sidebar nav a').forEach(a => a.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('chat-panel').classList.remove('active');
  document.getElementById('init-panel').classList.remove('active');
  document.getElementById('memory-panel').classList.remove('active');
  document.getElementById(name + '-panel').classList.add('active');
  document.getElementById('topbar').textContent =
    name === 'chat' ? '对话 · Growth Companion' :
    name === 'memory' ? '记忆 · Growth Companion' :
    '初始化 · Growth Companion';
  if (name === 'memory') loadMemory();
}

// Init
async function doInit() {
  const body = {
    user_id: userId,
    mbti: document.getElementById('f-mbti').value || null,
    emotion_style: document.getElementById('f-emotion').value,
    advice_preference: document.getElementById('f-advice').value,
    attachment_style: document.getElementById('f-attachment').value,
  };
  const res = await fetch(`${API}/api/init`, {
    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)
  });
  const data = await res.json();
  if (data.weights) {
    renderWeights(data.weights);
    alert('初始化成功！');
    showPanel('chat');
    document.querySelector('.sidebar nav a').classList.remove('active');
    document.querySelector('.sidebar nav a').classList.add('active');
  }
}

// Chat
async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  appendMsg('user', text);

  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  const msgEl = appendMsg('ai', '');
  const bubble = msgEl.querySelector('.bubble');

  try {
    const res = await fetch(`${API}/api/chat/stream`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ message: text, user_id: userId })
    });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let meta = [];

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          if (data.type === 'token') {
            bubble.textContent += data.content;
            scrollBottom();
          } else if (data.type === 'done') {
            const m = data.meta;
            if (m.emotion?.emotions?.length) meta.push('情绪: ' + m.emotion.emotions.join(', '));
            if (m.emotion?.importance >= 0.6) meta.push('事件已记录');
            if (m.reflection) meta.push('🔄 反思完成');
            if (meta.length) msgEl.querySelector('.meta').textContent = meta.join(' · ');
            if (m.reflection?.new_weights) renderWeights(m.reflection.new_weights);
          } else if (data.type === 'error') {
            bubble.textContent += '\n\n[错误] ' + data.message;
          }
        } catch {}
      }
    }
  } catch (e) {
    bubble.textContent = '连接失败：' + e.message;
  }
  btn.disabled = false;
  scrollBottom();
}

function appendMsg(role, html) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="bubble">${html}</div><div class="meta"></div>`;
  document.getElementById('messages').appendChild(div);
  scrollBottom();
  return div;
}

function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

// Memory
async function loadMemory() {
  try {
    const res = await fetch(`${API}/api/memory/core?user_id=${userId}`);
    const data = await res.json();
    document.getElementById('mem-profile').textContent = data.profile.content || '(空)';
    document.getElementById('mem-profile-cap').textContent =
      `${data.profile.chars} / ${data.profile.max_chars} 字符 (${data.profile.pct}%)`;
    document.getElementById('mem-notes').textContent = data.notes.content || '(空)';
    document.getElementById('mem-notes-cap').textContent =
      `${data.notes.chars} / ${data.notes.max_chars} 字符 (${data.notes.pct}%)`;

    const eRes = await fetch(`${API}/api/memory/events?user_id=${userId}&limit=20`);
    const events = await eRes.json();
    const el = document.getElementById('mem-events');
    if (!events.length) { el.textContent = '暂无事件记录'; return; }
    el.innerHTML = events.map(e => `
      <div class="event-item">
        <strong>${e.content}</strong>
        <div style="margin-top:4px">
          ${e.emotions.map(t => `<span>${t}</span>`).join('')}
          <span class="imp">${(e.importance * 100).toFixed(0)}%</span>
          <span style="color:#aaa;margin-left:8px">${e.event_type || ''}</span>
          <span style="float:right;color:#aaa">${new Date(e.created_at).toLocaleDateString()}</span>
        </div>
      </div>
    `).join('');
  } catch (e) {
    document.getElementById('mem-profile').textContent = '加载失败';
  }
}

// Weights
async function loadWeights() {
  try {
    const res = await fetch(`${API}/api/personality?user_id=${userId}`);
    const data = await res.json();
    renderWeights(data.weights);
  } catch {}
}

function renderWeights(w) {
  const el = document.getElementById('weights-display');
  el.innerHTML = '<div style="color:#888;margin-bottom:8px;">人格权重</div>' +
    Object.entries(w).map(([k, v]) => `
      <div class="row"><span>${k}</span><span>${v.toFixed(2)}</span></div>
      <div class="bar"><div class="bar-fill" style="width:${v * 100}%"></div></div>
    `).join('');
}

// Auto resize textarea
const ta = document.getElementById('input');
ta.addEventListener('input', () => {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
});

// Init
loadWeights();
</script>
</body>
</html>
